name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Create .vercel project config
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json << 'JSON'
          {"projectId":"","orgId":""}
          JSON

      - name: Deploy to Vercel (creates project on first run)
        id: deploy
        run: |
          vercel --yes \
            --prod \
            --name=pm-tracker-web \
            --build-env AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
            --build-env AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            --build-env AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
            --build-env SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            --env AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
            --env AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            --env AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
            --env SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee deploy.log
          URL=$(grep -oP 'https://[^\s]+\.vercel\.app' deploy.log | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
