name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          working-directory: ./
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-project-name: pm-tracker-web

      - name: Save deployment URL
        run: |
          echo "${{ steps.vercel-deploy.outputs.preview-url }}" > DEPLOYMENT_URL.txt
          echo "Live at: ${{ steps.vercel-deploy.outputs.preview-url }}"
          git config user.email "bot@github-actions.com"
          git config user.name "Deploy Bot"
          git add DEPLOYMENT_URL.txt
          git diff --staged --quiet || git commit -m "save deployment url"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
