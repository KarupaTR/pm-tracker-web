name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site to Vercel
        run: |
          npm install -g vercel@latest
          URL=$(vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "=============================="
          echo " LIVE URL: $URL"
          echo "=============================="
          echo "$URL" > /tmp/deploy_url.txt

      - name: Print deployment URL
        run: cat /tmp/deploy_url.txt || echo "Deployed successfully"
